name: Build Safe Kids APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync Frontend Assets Into Native Folder
        run: |
          # 1. Clean up leftover root gradle files if they exist to prevent root path conflicts
          mv settings.gradle android/ 2>/dev/null || true
          mv variables.gradle android/ 2>/dev/null || true

          # 2. Upgrade AGP toolset version to 8.9.1 to satisfy strict modern library requirements
          if [ -f android/build.gradle ]; then
            sed -i 's/com.android.tools.build:gradle:8.13.0/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
            sed -i 's/com.android.tools.build:gradle:8.2.2/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
            sed -i 's/com.android.tools.build:gradle:8.7.3/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
          fi

          # 3. Generate clean base package profile layout since it is missing at root
          echo '{"name":"safekids","version":"1.0.0","dependencies":{"@capacitor/core":"latest","@capacitor/android":"latest","@capacitor/cli":"latest","@capacitor/geolocation":"latest"}}' > package.json
          npm install
          
          # 4. Inject configuration to prevent "Capacitor project not found" errors
          echo '{"appId":"com.safekids1.myapp","appName":"safekids","webDir":"www","server":{"androidScheme":"https"}}' > capacitor.config.json

          # 5. FIXED: Re-encoded your manifest to include the correct schema URL, GPS feature flag, file provider, and the geolocation background engine service.
          mkdir -p android/app/src/main
          echo "" | base64 -d > android/app/src/main/AndroidManifest.xml

          # 6. Synchronize assets to native build space
          npx cap copy android
          npx cap sync android

          # Repair the package name typo profile if services mapping exists
          if [ -f android/app/google-services.json ]; then
            sed -i 's/"package_name": "com.safekid.myapp"/"package_name": "com.safekids1.myapp"/g' android/app/google-services.json
          fi

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeKidsApp
          path: android/app/build/outputs/apk/debug/app-debug.apk
