name: Build Safe Kids APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync Frontend Assets Into Native Folder
        run: |
          # Generate base package layout if missing
          if [ ! -f package.json ]; then
            echo '{"name":"safekids","version":"1.0.0","dependencies":{"@capacitor/core":"latest","@capacitor/android":"latest","@capacitor/cli":"latest"}}' > package.json
          fi
          
          # Force install the core location tracking plugins
          npm install
          npm install @capacitor/geolocation
          
          # FIXED: Dynamically repair the package name typo inside google-services.json if it exists
          if [ -f android/app/google-services.json ]; then
            sed -i 's/"package_name": "com.safekid.myapp"/"package_name": "com.safekids1.myapp"/g' android/app/google-services.json
          fi
          
          # Copy your www/ files into the native Android folder assets
          npx cap copy android
          
          # Synchronize configuration file structures
          npx cap sync android

      - name: Set up Java (Version 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeKidsApp
          path: android/app/build/outputs/apk/debug/app-debug.apk
