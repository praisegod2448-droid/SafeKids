name: Build Safe Kids APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync Frontend Assets Into Native Folder
        run: |
          # 1. Generate clean base package profile layout
          echo '{"name":"safekids","version":"1.0.0","dependencies":{"@capacitor/core":"latest","@capacitor/android":"latest","@capacitor/cli":"latest","@capacitor/geolocation":"latest"}}' > package.json
          npm install
          
          # 2. Inject configuration to prevent "Capacitor project not found" errors
          echo '{"appId":"com.safekids1.myapp","appName":"safekids","webDir":"www","server":{"androidScheme":"https"}}' > capacitor.config.json
          mkdir -p www
          echo '<html><body>Safe Kids Target Assets</body></html>' > www/index.html
          
          # 3. FIXED: Properly indented script execution block with correct schema URL
          mkdir -p android/app/src/main
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <application
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Safe Kids"
                  android:supportsRtl="true">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation|density"
                      android:name=".MainActivity"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 4. Synchronize assets to native build space
          npx cap copy android
          npx cap sync android

          # Repair the package name typo profile if services mapping exists
          if [ -f android/app/google-services.json ]; then
            sed -i 's/"package_name": "com.safekid.myapp"/"package_name": "com.safekids1.myapp"/g' android/app/google-services.json
          fi

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeKidsApp
          path: android/app/build/outputs/apk/debug/app-debug.apk
