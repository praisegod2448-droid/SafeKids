name: Build Safe Kids APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync Frontend Assets Into Native Folder
        run: |
          # 1. FIXED: Tab-indented multiline block using -EOF structure to preserve YAML requirements
          cat << -EOF > package.json
          {
            "name": "safekids",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "latest",
              "@capacitor/android": "latest",
              "@capacitor/cli": "latest",
              "@capacitor/geolocation": "latest"
            }
          }
          -EOF
          npm install
          
          # 2. Generate web folder framework
          mkdir -p www
          if [ -f index.html ]; then
            cp index.html www/index.html
          else
            echo "<html><body>SafeKids Stub</body></html>" > www/index.html
          fi
          
          cat << -EOF > capacitor.config.json
          {
            "appId": "com.safekids1.myapp",
            "appName": "SafeKids",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          -EOF

          # 3. Force bootstrap the Android native project structure
          npx cap android add || true
          npx cap copy android
          npx cap sync android

          # 4. Ensure all target asset directories exist before writing configuration payloads
          mkdir -p android/app/src/main/res/xml
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/values

          # 5. FIXED: Tab-indented resource mapping targets safely isolated via -EOF markers
          cat << -EOF > android/app/src/main/res/xml/network_security_config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true" />
          </network-security-config>
          -EOF

          cat << -EOF > android/app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="." />
          </paths>
          -EOF

          cat << -EOF > android/app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SafeKids</string>
              <string name="title_activity_main">MainActivity</string>
          </resources>
          -EOF

          # 6. FIXED: Formatted AndroidManifest generation using clean spacing to preserve mandatory android: namespace prefixes
          rm -f android/app/src/main/AndroidManifest.xml
          cat << -EOF > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              
              <application
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config"
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true">
                  <activity
                      android:name="com.safekids1.myapp.MainActivity"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation|density"
                      android:label="@string/title_activity_main"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.safekids1.myapp.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          -EOF

          # 7. Injected direct matching namespace keys inside app-level gradle to keep tool assemblies stable
          if [ -f android/app/build.gradle ]; then
            sed -i 's/applicationId ".*"/applicationId "com.safekids1.myapp"/g' android/app/build.gradle
            sed -i 's/namespace ".*"/namespace "com.safekids1.myapp"/g' android/app/build.gradle
          fi

          if [ -f android/app/google-services.json ]; then
            sed -i 's/"package_name": "com.safekid.myapp"/"package_name": "com.safekids1.myapp"/g' android/app/google-services.json
          fi

      - name: Set up Java Environment Matrix
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: |
            17
            21

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeKidsApp
          path: android/app/build/outputs/apk/debug/app-debug.apk
