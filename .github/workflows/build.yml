name: Build Safe Kids APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync Frontend Assets Into Native Folder
        run: |
          # 1. Clean up leftover root gradle files if they exist to prevent root path conflicts
          mv settings.gradle android/ 2>/dev/null || true
          mv variables.gradle android/ 2>/dev/null || true

          # 2. Upgrade AGP toolset version to 8.9.1 to satisfy strict modern library requirements
          if [ -f android/build.gradle ]; then
            sed -i 's/com.android.tools.build:gradle:8.13.0/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
            sed -i 's/com.android.tools.build:gradle:8.2.2/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
            sed -i 's/com.android.tools.build:gradle:8.7.3/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
          fi

          # 3. Generate clean base package profile layout since it is missing at root
          echo '{"name":"safekids","version":"1.0.0","dependencies":{"@capacitor/core":"latest","@capacitor/android":"latest","@capacitor/cli":"latest","@capacitor/geolocation":"latest"}}' > package.json
          npm install
          
          # 4. Inject configuration to prevent "Capacitor project not found" errors
          echo '{"appId":"com.safekids1.myapp","appName":"safekids","webDir":"www","server":{"androidScheme":"https"}}' > capacitor.config.json

          # 5. FIXED: Using indented Heredoc with `~` indicator to ensure perfect YAML syntax compatibility
          mkdir -p android/app/src/main
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-feature android:name="android.hardware.location.gps" android:required="true" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <application
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config"
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation|density"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
                  <service
                      android:name="com.capacitorjs.plugins.geolocation.GeolocationService"
                      android:foregroundServiceType="location"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

          # 5b. Strip out the indentation whitespace added for YAML validation safety
          sed -i 's/^[ \t]*//' android/app/src/main/AndroidManifest.xml

          # 6. Synchronize assets to native build space
          npx cap copy android
          npx cap sync android

          # Repair the package name typo profile if services mapping exists
          if [ -f android/app/google-services.json ]; then
            sed -i 's/"package_name": "com.safekid.myapp"/"package_name": "com.safekids1.myapp"/g' android/app/google-services.json
          fi

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeKidsApp
          path: android/app/build/outputs/apk/debug/app-debug.apk
