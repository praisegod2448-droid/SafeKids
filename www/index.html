<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: https://*.openstreetmap.org https://google.com https://*.google.com; frame-src 'self' https://*.openstreetmap.org;">
  <title>Safe Kids Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; color: #333; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
    h1 { color: #1a73e8; font-size: 24px; margin-bottom: 5px; }
    button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 25px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; transition: 0.3s; }
    button:active { background: #1557b0; }
    .status { margin-top: 15px; font-weight: bold; color: #555; background: #eef0f2; padding: 8px; border-radius: 8px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; text-align: left; }
    .info-item { background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 4px solid #1a73e8; }
    .info-label { font-size: 12px; color: #666; text-transform: uppercase; }
    .info-val { font-size: 15px; font-weight: bold; }
    #map-container { height: 260px; width: 100%; margin-top: 20px; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; background: #eef0f2; }
    #map-frame { width: 100%; height: 100%; border: none; display: none; }
    .placeholder-text { color: #888; font-size: 14px; padding: 80px 20px 0 20px; }
  </style>
</head>
<body>

  <div class="card">
    <h1>🛡️ Safe Kids</h1>
    <p style="color: #666; margin-top: 0;">Parental Tracking Service</p>
    <hr style="border: 0; border-top: 1px solid #eee;">
    
    <div class="status" id="status-msg">Service Status: Idle</div>
    
    <button id="track-btn" onclick="initializeTracking()">Start Live Tracking</button>

    <div class="info-grid">
        <div class="info-item">
            <div class="info-label">Latitude</div>
            <div id="lat" class="info-val">Not tracking</div>
        </div>
        <div class="info-item">
            <div class="info-label">Longitude</div>
            <div id="lng" class="info-val">Not tracking</div>
        </div>
    </div>

    <div id="map-container">
        <div id="map-placeholder" class="placeholder-text">Tap "Start Live Tracking" to view map streaming values.</div>
        <iframe id="map-frame" src=""></iframe>
    </div>
  </div>

  <!-- Framework communication scripts loaded from offline local app roots -->
  <script src="cordova.js"></script>
  <script src="capacitor.js"></script>

  <!-- Production-ready Firebase configuration scripts -->
  <script src="https://gstatic.com"></script>
  <script src="https://gstatic.com"></script>

  <script>
    let database = null;

    // Connect to your online Firebase nodes securely
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyAYAncbgqEYPuj4Noi1RVQwoOyaQdVCpAQ",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "safekid-b9bcf",
            storageBucket: "safekid-b9bcf.firebasestorage.app",
            messagingSenderId: "230273927504",
            appId: "1:230273927504:android:8aa367535245bb65e54455"
        };
        if (firebase.apps.length === 0) {
            firebase.initializeApp(firebaseConfig);
        }
        database = firebase.database();
    } catch (e) {
        console.error("Database connection initialization bypassed:", e);
    }

    async function initializeTracking() {
      const statusMsg = document.getElementById('status-msg');
      const latSpan = document.getElementById('lat');
      const lngSpan = document.getElementById('lng');

      statusMsg.innerText = "Requesting permissions...";
      statusMsg.style.color = "#555";

      try {
        // Use the global platform container window rather than external URLs
        if (!window.Capacitor || !window.Capacitor.Plugins.Geolocation) {
            alert("App platform waking up. Running browser tracker fallback configuration path.");
            fallbackTracker();
            return;
        }

        const Geolocation = window.Capacitor.Plugins.Geolocation;

        // Force native system dialog popup window prompts
        let perm = await Geolocation.checkPermissions();
        if (perm.location !== 'granted') {
            perm = await Geolocation.requestPermissions({ permissions: ['location'] });
        }

        if (perm.location !== 'granted') {
            statusMsg.innerText = "Permission Denied";
            statusMsg.style.color = "red";
            return;
        }

        statusMsg.innerText = "Tracking Active";
        statusMsg.style.color = "green";

        // Listen for hardware movement calculations continuously in the background
        await Geolocation.watchPosition({ enableHighAccuracy: true, timeout: 10000 }, (position, err) => {
          if (position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;
            
            latSpan.innerText = latitude.toFixed(6);
            lngSpan.innerText = longitude.toFixed(6);
            
            syncToFirebaseAndMap(latitude, longitude);
          }
          if (err) {
            statusMsg.innerText = "GPS Error: " + err.message;
            statusMsg.style.color = "red";
          }
        });

      } catch (error) {
        statusMsg.innerText = "System Failure";
        statusMsg.style.color = "red";
        console.error(error);
      }
    }

    function fallbackTracker() {
        const statusMsg = document.getElementById('status-msg');
        if (navigator.geolocation) {
            statusMsg.innerText = "Tracking Active (Web)";
            statusMsg.style.color = "green";
            navigator.geolocation.watchPosition((pos) => {
                document.getElementById('lat').innerText = pos.coords.latitude.toFixed(6);
                document.getElementById('lng').innerText = pos.coords.longitude.toFixed(6);
                syncToFirebaseAndMap(pos.coords.latitude, pos.coords.longitude);
            }, (err) => {
                statusMsg.innerText = "Tracking Error: " + err.message;
                statusMsg.style.color = "red";
            }, { enableHighAccuracy: true });
        }
    }

    function syncToFirebaseAndMap(latitude, longitude) {
        // Stream metrics up into your Firebase cloud node structure
        if (database) {
            database.ref('devices/device_01/tracking').set({
                latitude: latitude,
                longitude: longitude,
                lastUpdated: new Date().toISOString()
            });
        }

        // Render coordinates inside your visual map canvas 
        const mapUrl = "https://openstreetmap.org" + 
                       (longitude - 0.005) + "%2C" + (latitude - 0.003) + "%2C" + 
                       (longitude + 0.005) + "%2C" + (latitude + 0.003) + 
                       "&layer=mapnik&marker=" + latitude + "%2C" + longitude;
        
        document.getElementById('map-frame').src = mapUrl;
        document.getElementById('map-placeholder').style.display = 'none';
        document.getElementById('map-frame').style.display = 'block';
    }
  </script>
</body>
</html>
