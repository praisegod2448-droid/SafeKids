<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: https://*.openstreetmap.org https://google.com https://*.google.com; frame-src 'self' https://*.openstreetmap.org;">
    <title>Safe Kids Parental Control</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 20px auto; max-width: 400px; }
        h1 { color: #1a73e8; margin-bottom: 5px; font-size: 24px; }
        .status { font-size: 18px; font-weight: bold; margin: 15px 0; padding: 10px; border-radius: 8px; }
        .online { background-color: #e6f4ea; color: #137333; }
        .btn { background-color: #1a73e8; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn:active { background-color: #1557b0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; text-align: left; }
        .info-item { background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 4px solid #1a73e8; }
        .info-label { font-size: 12px; color: #666; text-transform: uppercase; }
        .info-val { font-size: 15px; font-weight: bold; }
        #map-container { height: 260px; width: 100%; margin-top: 20px; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; background: #eef0f2; }
        #map-frame { width: 100%; height: 100%; border: none; display: none; }
        .placeholder-text { color: #888; font-size: 14px; padding: 80px 20px 0 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Safe Kids</h1>
        <p style="color: #666; margin-top: 0;">Parent Dashboard Terminal</p>

        <div class="status online">✨ Device Monitoring Active</div>

        <button class="btn" onclick="updateLocation()">🛰️ Sync Live GPS Location</button>
        <button class="btn" onclick="alert('Sending ping to device...')" style="background-color: #34a853;">🔔 Test Device Connection</button>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Current Latitude</div>
                <div id="lat" class="info-val">Click Sync...</div>
            </div>
            <div class="info-item">
                <div class="info-label">Current Longitude</div>
                <div id="lon" class="info-val">Click Sync...</div>
            </div>
        </div>

        <div id="map-container">
            <div id="map-placeholder" class="placeholder-text">Tap "Sync Live GPS Location" to resolve map details.</div>
            <iframe id="map-frame" src=""></iframe>
        </div>
    </div>

    <!-- Mandatory Capacitor Bridge Files -->
    <script src="cordova.js"></script>
    <script src="capacitor.js"></script>

    <script>
        async function updateLocation() {
            const latEl = document.getElementById('lat');
            const lonEl = document.getElementById('lon');
            const mapFrame = document.getElementById('map-frame');
            const mapPlaceholder = document.getElementById('map-placeholder');

            latEl.innerText = "Syncing...";
            lonEl.innerText = "Syncing...";

            try {
                // Verify Capacitor is loaded inside the native mobile environment
                if (!window.Capacitor || !window.Capacitor.Plugins.Geolocation) {
                    throw new Error("Capacitor Native Geolocation plugin not detected.");
                }

                const Geolocation = window.Capacitor.Plugins.Geolocation;

                // FORCE Android to trigger the native permission popup dialog window
                let permissions = await Geolocation.checkPermissions();
                if (permissions.location !== 'granted') {
                    permissions = await Geolocation.requestPermissions({ permissions: ['location'] });
                }

                if (permissions.location !== 'granted') {
                    latEl.innerText = "Denied";
                    lonEl.innerText = "Check Settings";
                    mapPlaceholder.innerText = "Please enable location permission in Android App Info settings.";
                    return;
                }

                // Fetch accurate hardware-level coordinates via native bridge
                const position = await Geolocation.getCurrentPosition({
                    enableHighAccuracy: true,
                    timeout: 10000
                });

                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;

                latEl.innerText = latitude.toFixed(5);
                lonEl.innerText = longitude.toFixed(5);

                // Load the OpenStreetMap iframe module mapping window
                const mapUrl = "https://openstreetmap.org" + 
                               (longitude - 0.005) + "%2C" + (latitude - 0.003) + "%2C" + 
                               (longitude + 0.005) + "%2C" + (latitude + 0.003) + 
                               "&layer=mapnik&marker=" + latitude + "%2C" + longitude;
                
                mapFrame.src = mapUrl;
                mapPlaceholder.style.display = 'none';
                mapFrame.style.display = 'block';

            } catch (error) {
                latEl.innerText = "Error";
                lonEl.innerText = "Plugin Failure";
                mapPlaceholder.innerText = error.message || "Native bridging setup failed.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
